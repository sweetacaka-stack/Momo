<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系方式</title>
    <style>
        :root {
            --gold: #c9ad72;
            --ink: #0b0a08;
            --paper: rgba(243, 239, 231, 0.78);
            --muted: rgba(243, 239, 231, 0.56);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background: var(--ink);
            color: #fff;
            font-family: Arial, "Microsoft YaHei", sans-serif;
        }

        body {
            overflow: hidden;
        }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 48px;
        }

        .background {
            position: fixed;
            inset: 0;
            background:
                linear-gradient(120deg, rgba(243, 239, 231, 0.055), transparent 34%),
                radial-gradient(circle at 18% 20%, rgba(201, 173, 114, 0.14), transparent 28%),
                radial-gradient(circle at 78% 72%, rgba(143, 183, 170, 0.1), transparent 30%),
                #0b0a08;
        }

        .background::before,
        .background::after {
            content: "";
            position: absolute;
            inset: -20%;
            opacity: 0.18;
            background-image:
                linear-gradient(rgba(255,255,255,0.18) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px);
            background-size: 44px 44px;
            transform: rotate(-12deg);
        }

        .background::after {
            opacity: 0.12;
            background-size: 180px 180px;
            transform: rotate(18deg) scale(1.2);
        }

        .shell {
            width: min(980px, calc(100vw - 48px));
            min-height: min(620px, calc(100vh - 96px));
            display: grid;
            grid-template-columns: 1.08fr 0.92fr;
            border: 1px solid rgba(255,255,255,0.16);
            background:
                linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03)),
                rgba(20, 18, 15, 0.72);
            box-shadow: 0 28px 90px rgba(0,0,0,0.48);
            backdrop-filter: blur(18px);
        }

        .hero {
            position: relative;
            padding: clamp(34px, 5vw, 64px);
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 340px;
            height: 340px;
            left: -120px;
            bottom: -80px;
            border: 1px dashed rgba(255,255,255,0.28);
            border-radius: 50%;
            box-shadow: inset 0 0 40px rgba(255,255,255,0.06);
        }

        .eyebrow {
            margin-bottom: 58px;
            color: var(--gold);
            font-size: 12px;
            letter-spacing: 0.24em;
            text-transform: uppercase;
        }

        .name {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(64px, 10vw, 112px);
            font-style: italic;
            font-weight: 400;
            line-height: 0.9;
            letter-spacing: 0;
        }

        .alias {
            display: block;
            margin-top: 18px;
            color: var(--paper);
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(24px, 4vw, 42px);
            font-style: italic;
            text-align: right;
        }

        .line {
            width: 120px;
            height: 1px;
            margin: 42px 0 0 auto;
            background: var(--gold);
            box-shadow: 0 0 22px rgba(201, 173, 114, 0.46);
        }

        .contact-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 28px;
            padding: clamp(34px, 5vw, 60px);
            border-left: 1px solid rgba(255,255,255,0.12);
            background: rgba(0,0,0,0.2);
        }

        .contact-row {
            display: grid;
            gap: 8px;
        }

        .label {
            color: var(--muted);
            font-size: 13px;
            letter-spacing: 0.1em;
            text-transform: lowercase;
        }

        .value {
            color: #fff;
            font-size: clamp(18px, 2.2vw, 24px);
            letter-spacing: 0.04em;
            text-decoration: none;
        }

        .wechat-block {
            display: grid;
            grid-template-columns: 116px 1fr;
            align-items: end;
            gap: 20px;
            margin-top: 8px;
        }

        .qr {
            width: 116px;
            aspect-ratio: 1;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            padding: 10px;
            background: #f6f2ea;
            border: 1px solid rgba(255,255,255,0.65);
            box-shadow: 0 12px 30px rgba(0,0,0,0.35);
        }

        .qr span {
            background: #111;
        }

        .qr span:nth-child(3n),
        .qr span:nth-child(5n),
        .qr span:nth-child(7n) {
            background: transparent;
        }

        .note {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
        }

        .back {
            position: fixed;
            left: 28px;
            top: 24px;
            z-index: 2;
            color: rgba(255,255,255,0.68);
            font-size: 13px;
            letter-spacing: 0.12em;
            text-decoration: none;
        }

        .back:hover {
            color: #fff;
        }

        @media (max-width: 760px) {
            body {
                overflow: auto;
            }

            .page {
                min-height: auto;
                padding: 72px 24px 28px;
            }

            .shell {
                grid-template-columns: 1fr;
                width: 100%;
            }

            .contact-card {
                border-left: 0;
                border-top: 1px solid rgba(255,255,255,0.12);
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <a class="back" href="../作品集.html">BACK / HOME</a>

    <div class="page">
        <main class="shell">
            <section class="hero">
                <div class="eyebrow">Contact Card</div>
                <h1 class="name">Bin · Bin</h1>
                <span class="alias">zhang</span>
                <div class="line"></div>
            </section>

            <section class="contact-card">
                <div class="contact-row">
                    <span class="label">contact number</span>
                    <a class="value" href="tel:15098039595">15098039595</a>
                </div>

                <div class="contact-row">
                    <span class="label">e-mail</span>
                    <a class="value" href="mailto:2922717190@qq.com">2922717190@qq.com</a>
                </div>

                <div class="wechat-block">
                    <div class="qr" aria-label="wechat qr placeholder">
                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                    </div>
                    <p class="note">wechat<br>二维码区域已预留，可替换为真实微信二维码图片。</p>
                </div>
            </section>
        </main>
    </div>
    <script>
        document.addEventListener('dblclick', (event) => {
            if (event.target.closest('a, button, .shell, .back')) return;
            window.location.href = '../作品集.html';
        });
    </script>
</body>
</html>
