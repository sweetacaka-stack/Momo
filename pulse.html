<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画廊</title>
    <style>
        :root {
            --ink: #12100d;
            --paper: #f3efe7;
            --muted: #827b70;
            --line: rgba(18, 16, 13, 0.13);
            --accent: #c9ad72;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: var(--paper);
            color: var(--ink);
            font-family: Arial, "Microsoft YaHei", sans-serif;
        }

        body {
            overflow-x: hidden;
        }

        .page {
            position: relative;
            min-height: 100vh;
            padding: clamp(22px, 4vw, 48px);
            background:
                linear-gradient(var(--line) 1px, transparent 1px),
                linear-gradient(90deg, var(--line) 1px, transparent 1px),
                var(--paper);
            background-size: 48px 48px;
        }

        .topbar {
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 18px;
            border-bottom: 2px solid var(--ink);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .back {
            color: var(--ink);
            text-decoration: none;
        }

        .issue {
            display: flex;
            gap: 16px;
            color: var(--muted);
        }

        .hero {
            position: relative;
            min-height: calc(100vh - 92px);
            padding-top: clamp(34px, 6vw, 74px);
        }

        .headline {
            position: relative;
            z-index: 3;
            max-width: 1120px;
            margin: 0;
            font-size: clamp(58px, 10.8vw, 172px);
            font-weight: 950;
            line-height: 0.82;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }

        .headline span {
            display: block;
        }

        .caption-row {
            position: relative;
            z-index: 4;
            display: flex;
            align-items: center;
            gap: 18px;
            margin-top: 18px;
            color: var(--muted);
            font-family: Georgia, "Times New Roman", serif;
            font-size: 14px;
            letter-spacing: 0.08em;
        }

        .caption-row::before {
            content: "";
            width: 72px;
            height: 2px;
            background: var(--ink);
        }

        .gallery-stage {
            position: absolute;
            inset: 120px 0 0 0;
            pointer-events: none;
        }

        .piece {
            position: absolute;
            overflow: hidden;
            border: 10px solid var(--paper);
            background: #ddd;
            box-shadow: 0 26px 70px rgba(0, 0, 0, 0.22);
        }

        .piece img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.02) saturate(0.92);
        }

        .piece::after {
            content: attr(data-label);
            position: absolute;
            left: 14px;
            bottom: 12px;
            padding: 5px 8px;
            background: rgba(242, 240, 234, 0.9);
            color: var(--ink);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .piece-a {
            left: 7vw;
            top: 30vh;
            width: clamp(170px, 20vw, 286px);
            height: clamp(250px, 29vw, 410px);
            transform: rotate(-2deg);
        }

        .piece-b {
            left: 34vw;
            top: 24vh;
            width: clamp(220px, 23vw, 330px);
            height: clamp(245px, 28vw, 390px);
            z-index: 2;
            transform: rotate(1deg);
        }

        .piece-c {
            right: 7vw;
            top: 18vh;
            width: clamp(260px, 30vw, 430px);
            height: clamp(300px, 34vw, 480px);
            transform: rotate(2deg);
        }

        .piece-d {
            right: 25vw;
            bottom: 5vh;
            width: clamp(150px, 17vw, 240px);
            height: clamp(170px, 18vw, 250px);
            border-width: 8px;
            transform: rotate(-3deg);
        }

        .side-note {
            position: absolute;
            right: clamp(24px, 4vw, 56px);
            bottom: clamp(24px, 4vw, 52px);
            z-index: 4;
            width: min(310px, 72vw);
            border-top: 2px solid var(--ink);
            padding-top: 14px;
            font-size: 13px;
            line-height: 1.8;
            color: #3a3833;
        }

        .side-note strong {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .month-mark {
            position: absolute;
            left: 50%;
            bottom: 24px;
            z-index: 4;
            transform: translateX(-50%);
            color: var(--muted);
            font-family: Georgia, "Times New Roman", serif;
            font-size: 13px;
        }

        .gold-dot {
            position: absolute;
            top: 27vh;
            left: 25vw;
            z-index: 1;
            width: 180px;
            aspect-ratio: 1;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201, 173, 114, 0.72), rgba(201, 173, 114, 0.16) 52%, transparent 68%);
            mix-blend-mode: multiply;
        }

        @media (max-width: 860px) {
            .hero {
                min-height: auto;
                padding-bottom: 42px;
            }

            .gallery-stage {
                position: relative;
                inset: auto;
                display: grid;
                grid-template-columns: 1fr;
                gap: 18px;
                margin-top: 34px;
                pointer-events: auto;
            }

            .piece {
                position: relative;
                inset: auto;
                width: 100%;
                height: 58vh;
                transform: none;
            }

            .side-note,
            .month-mark,
            .gold-dot {
                position: relative;
                inset: auto;
                transform: none;
                margin-top: 28px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <nav class="topbar">
            <a class="back" href="../作品集.html">BACK / HOME</a>
            <div class="issue">
                <span>GALLERY 01</span>
                <span>LOOKBOOK</span>
            </div>
        </nav>

        <section class="hero">
            <h1 class="headline">
                <span>Gallery</span>
                <span>The Lookback</span>
                <span>Works / 2025</span>
            </h1>

            <div class="caption-row">INSPIRE / 视觉档案</div>
            <div class="gold-dot"></div>

            <div class="gallery-stage" aria-label="gallery layout">
                <figure class="piece piece-a" data-label="TEXTURE">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=900" alt="">
                </figure>
                <figure class="piece piece-b" data-label="POSTER">
                    <img src="https://images.unsplash.com/photo-1633167606207-d840b5070fc2?w=900" alt="">
                </figure>
                <figure class="piece piece-c" data-label="SCENE">
                    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1000" alt="">
                </figure>
                <figure class="piece piece-d" data-label="DETAIL">
                    <img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=900" alt="">
                </figure>
            </div>

            <aside class="side-note">
                <strong>Curated Works</strong>
                用大标题、错位图片与留白构成画廊式浏览体验。后续可把这里替换为真实项目图片、海报、C4D 渲染或产品视觉。
            </aside>

            <div class="month-mark">八月 / August</div>
        </section>
    </main>
    <script>
        document.addEventListener('dblclick', (event) => {
            if (event.target.closest('a, button, img, figure, .piece, .topbar')) return;
            window.location.href = '../作品集.html';
        });
    </script>
</body>
</html>
