<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品视频</title>
    <style>
        :root {
            --gold: #c9ad72;
            --ink: #0b0a08;
            --muted: rgba(243, 239, 231, 0.58);
            --sage: #8fb7aa;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--ink);
            color: #fff;
            font-family: Arial, "Microsoft YaHei", sans-serif;
        }

        body {
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 50% 45%, rgba(143, 183, 170, 0.16), transparent 34%),
                radial-gradient(circle at 78% 18%, rgba(201, 173, 114, 0.1), transparent 30%),
                linear-gradient(rgba(243,239,231,0.055) 1px, transparent 1px),
                linear-gradient(90deg, rgba(243,239,231,0.04) 1px, transparent 1px),
                var(--ink);
            background-size: auto, auto, 48px 48px, 48px 48px, auto;
        }

        .back {
            position: fixed;
            left: 28px;
            top: 24px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-decoration: none;
        }

        .panel {
            width: min(900px, calc(100vw - 48px));
            min-height: min(520px, calc(100vh - 96px));
            display: grid;
            place-items: center;
            border: 1px solid rgba(243,239,231,0.15);
            background: linear-gradient(135deg, rgba(243,239,231,0.11), rgba(243,239,231,0.025));
            box-shadow: 0 28px 90px rgba(0,0,0,0.45);
            text-align: center;
        }

        .eyebrow {
            margin-bottom: 18px;
            color: var(--gold);
            font-size: 12px;
            letter-spacing: 0.26em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(54px, 10vw, 132px);
            line-height: 0.9;
            letter-spacing: 0;
            font-family: Georgia, "Times New Roman", serif;
            font-weight: 400;
        }

        .hint {
            margin-top: 28px;
            color: var(--muted);
            font-size: 13px;
            letter-spacing: 0.08em;
        }
    </style>
</head>
<body>
    <a class="back" href="../index.html">BACK / HOME</a>
    <main class="panel">
        <section>
            <div class="eyebrow">Coming Soon</div>
            <h1>产品视频</h1>
            <p class="hint">视频内容区域预留中，双击空白处返回主页。</p>
        </section>
    </main>
    <script>
        document.addEventListener('dblclick', (event) => {
            if (event.target.closest('a, .panel')) return;
            window.location.href = '../index.html';
        });
    </script>
</body>
</html>
