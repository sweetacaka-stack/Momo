<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集</title>
    <style>
        :root {
            --bg: #f3efe7;
            --ink: #12100d;
            --muted: #827b70;
            --line: rgba(18, 16, 13, 0.13);
            --gold: #c9ad72;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            background:
                linear-gradient(var(--line) 1px, transparent 1px),
                linear-gradient(90deg, var(--line) 1px, transparent 1px),
                var(--bg);
            background-size: 56px 56px;
            color: var(--ink);
            font-family: Arial, "Microsoft YaHei", sans-serif;
        }

        img {
            max-width: none;
        }

        .page {
            width: min(1480px, calc(100vw - 48px));
            margin: 0 auto;
            padding: 34px 0 72px;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 0;
            background: rgba(243, 239, 231, 0.84);
            border-bottom: 2px solid var(--ink);
            backdrop-filter: blur(16px);
        }

        .back {
            color: var(--ink);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.16em;
            text-decoration: none;
        }

        .top-meta {
            display: flex;
            gap: 18px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(220px, 360px);
            gap: clamp(28px, 5vw, 74px);
            align-items: end;
            padding: clamp(48px, 8vw, 118px) 0 44px;
        }

        h1 {
            margin: 0;
            font-size: clamp(58px, 13vw, 190px);
            font-weight: 950;
            line-height: 0.82;
            letter-spacing: -0.06em;
            text-transform: uppercase;
        }

        .intro {
            margin: 0 0 12px;
            color: #3d3932;
            font-size: 14px;
            line-height: 1.9;
        }

        .hint {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-family: Georgia, "Times New Roman", serif;
            font-size: 13px;
        }

        .hint::before {
            content: "";
            width: 70px;
            height: 2px;
            background: var(--ink);
        }

        .gallery {
            column-count: 4;
            column-gap: 18px;
        }

        .work {
            position: relative;
            display: inline-block;
            width: 100%;
            margin: 0 0 18px;
            break-inside: avoid;
            overflow: hidden;
            background: #ddd;
            border: 10px solid var(--bg);
            box-shadow: 0 22px 54px rgba(0, 0, 0, 0.14);
            cursor: zoom-in;
        }

        .work img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            image-rendering: auto;
            transform: translateZ(0);
        }

        .work figcaption {
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: 12px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 10px;
            background: rgba(243, 239, 231, 0.9);
            color: var(--ink);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.24s ease, transform 0.24s ease;
        }

        .work:hover figcaption {
            opacity: 1;
            transform: translateY(0);
        }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 28px;
            background: rgba(11, 10, 8, 0.88);
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox img {
            max-width: min(100%, 1600px);
            max-height: 92vh;
            width: auto;
            height: auto;
            object-fit: contain;
            box-shadow: 0 28px 90px rgba(0, 0, 0, 0.6);
        }

        .close {
            position: fixed;
            top: 24px;
            right: 28px;
            border: 0;
            background: transparent;
            color: #fff;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.14em;
            cursor: pointer;
        }

        @media (max-width: 1180px) {
            .gallery {
                column-count: 3;
            }
        }

        @media (max-width: 860px) {
            .page {
                width: min(100% - 28px, 720px);
            }

            .hero {
                grid-template-columns: 1fr;
            }

            .gallery {
                column-count: 2;
                column-gap: 12px;
            }

            .work {
                margin-bottom: 12px;
                border-width: 7px;
            }
        }

        @media (max-width: 560px) {
            .gallery {
                column-count: 1;
            }

            .top-meta {
                display: none;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <nav class="topbar">
            <a class="back" href="../作品集.html">BACK / HOME</a>
            <div class="top-meta">
                <span>Portfolio</span>
                <span>Original Quality</span>
            </div>
        </nav>

        <header class="hero">
            <h1>Portfolio<br>Archive</h1>
            <div>
                <p class="intro">把图片地址放入下方数据列表后，页面会自动按图片原始比例排列。图片使用原始资源加载，不裁剪、不压缩、不强制统一高度。</p>
                <span class="hint">点击图片查看原尺寸预览</span>
            </div>
        </header>

        <section class="gallery" id="gallery"></section>
    </main>

    <div class="lightbox" id="lightbox" aria-hidden="true">
        <button class="close" type="button" id="closeBtn">CLOSE</button>
        <img id="lightboxImage" alt="">
    </div>

    <script>
        const works = [
            {
                title: "Visual 01",
                type: "Poster",
                src: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1800"
            },
            {
                title: "Visual 02",
                type: "Scene",
                src: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1800"
            },
            {
                title: "Visual 03",
                type: "Texture",
                src: "https://images.unsplash.com/photo-1633167606207-d840b5070fc2?w=1800"
            },
            {
                title: "Visual 04",
                type: "C4D",
                src: "https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1800"
            },
            {
                title: "Visual 05",
                type: "Detail",
                src: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=1800"
            },
            {
                title: "Visual 06",
                type: "Product",
                src: "https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=1800"
            }
        ];

        const gallery = document.getElementById("gallery");
        const lightbox = document.getElementById("lightbox");
        const lightboxImage = document.getElementById("lightboxImage");
        const closeBtn = document.getElementById("closeBtn");

        works.forEach((work, index) => {
            const figure = document.createElement("figure");
            figure.className = "work";

            const image = document.createElement("img");
            image.src = work.src;
            image.alt = work.title;
            image.loading = index < 4 ? "eager" : "lazy";
            image.decoding = "async";

            const caption = document.createElement("figcaption");
            caption.innerHTML = `<span>${work.title}</span><span>${work.type}</span>`;

            figure.append(image, caption);
            figure.addEventListener("click", () => openLightbox(work.src, work.title));
            gallery.appendChild(figure);
        });

        function openLightbox(src, title) {
            lightboxImage.src = src;
            lightboxImage.alt = title;
            lightbox.classList.add("open");
            lightbox.setAttribute("aria-hidden", "false");
        }

        function closeLightbox() {
            lightbox.classList.remove("open");
            lightbox.setAttribute("aria-hidden", "true");
            lightboxImage.removeAttribute("src");
        }

        closeBtn.addEventListener("click", closeLightbox);
        lightbox.addEventListener("click", (event) => {
            if (event.target === lightbox) closeLightbox();
        });
        window.addEventListener("keydown", (event) => {
            if (event.key === "Escape") closeLightbox();
        });

        document.addEventListener("dblclick", (event) => {
            if (event.target.closest("a, button, img, figure, .work, .lightbox")) return;
            window.location.href = "../作品集.html";
        });
    </script>
</body>
</html>
